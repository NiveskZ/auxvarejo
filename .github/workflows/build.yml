name: Gerar .exe Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # permite rodar manualmente pelo site do GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install flask openpyxl pyinstaller

      - name: Gerar o .exe
        run: |
          pyinstaller --onefile --add-data "templates;templates" --name AuxVarejo --noconsole app.py

      - name: Disponibilizar o .exe para download
        uses: actions/upload-artifact@v4
        with:
          name: AuxVarejo-Windows
          path: dist/AuxVarejo.exe
          retention-days: 30
